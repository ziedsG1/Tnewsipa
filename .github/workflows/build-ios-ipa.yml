name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/TnewsWidget.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$RUNNER_TEMP/TnewsWidget.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr TnewsWidget-unsigned.ipa Payload
          ls -lh TnewsWidget-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TnewsWidget-ipa
          path: ${{ runner.temp }}/TnewsWidget-unsigned.ipa
          retention-days: 30
