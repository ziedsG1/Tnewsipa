name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject Groq + optional Gemini API keys
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_API_BASE: https://api.groq.com/openai/v1/chat/completions
          AI_API_MODEL: llama-3.3-70b-versatile
          GEMINI_MODEL: gemini-2.0-flash
        run: |
          if [ -n "$GROQ_API_KEY" ] || [ -n "$GEMINI_API_KEY" ]; then
            npm run ai:config
          else
            echo "Add GROQ_API_KEY and/or GEMINI_API_KEY in GitHub Actions secrets"
          fi

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build unsigned IPA
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/TnewsWidget.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          APP_PATH="$RUNNER_TEMP/TnewsWidget.xcarchive/Products/Applications/App.app"
          echo "App bundle contents:"
          ls -la "$APP_PATH"
          ls -la "$APP_PATH/PlugIns" 2>/dev/null || echo "No PlugIns folder"

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr TnewsWidget-unsigned.ipa Payload
          ls -lh TnewsWidget-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TnewsWidget-ipa
          path: ${{ runner.temp }}/TnewsWidget-unsigned.ipa
          retention-days: 30
