<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Tnews</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="app-header">
        <div class="header-top">
          <h1 class="app-title">Tnews</h1>
          <div class="header-actions">
            <button type="button" class="icon-btn" id="theme-btn" title="Theme">◐</button>
            <button type="button" class="icon-btn" id="share-btn" title="Share">↗</button>
            <button type="button" class="icon-btn" id="refresh-btn" title="Refresh">↻</button>
          </div>
        </div>
        <div class="weather-bar" id="weather-bar">
          <span class="weather-icon" aria-hidden="true">☁</span>
          <span class="weather-text" id="weather-text">جاري تحميل الطقس…</span>
        </div>
      </header>

      <div class="status-bar">
        <p class="status" id="status">جاري التحميل…</p>
        <span class="article-count" id="article-count"></span>
      </div>

      <main class="news-scroll" id="news-scroll">
        <div class="news-list" id="news-list"></div>
      </main>
    </div>
    <script src="lib/newsFetcher.js"></script>
    <script src="lib/weather.js"></script>
    <script src="lib/shareCard.js"></script>
    <script src="app.js"></script>
    <script src="widget.js"></script>
  </body>
</html>
