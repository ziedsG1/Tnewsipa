<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Tnews</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="app-header">
        <div class="header-top">
          <h1 class="app-title">Tnews</h1>
          <div class="header-actions">
            <button type="button" class="icon-btn" id="notify-btn" title="Notifications">🔔</button>
            <button type="button" class="icon-btn" id="theme-btn" title="Theme">◐</button>
            <button type="button" class="icon-btn" id="share-btn" title="Share">↗</button>
            <button type="button" class="icon-btn" id="refresh-btn" title="Refresh">↻</button>
          </div>
        </div>
        <div class="weather-bar" id="weather-bar">
          <span class="weather-icon" aria-hidden="true">☁</span>
          <span class="weather-text" id="weather-text">جاري تحميل الطقس…</span>
        </div>
      </header>

      <div class="status-bar">
        <p class="status" id="status">جاري التحميل…</p>
        <span class="article-count" id="article-count"></span>
      </div>

      <main class="news-scroll" id="news-scroll">
        <div class="news-list" id="news-list"></div>
      </main>
    </div>

    <div class="ai-panel" id="ai-panel" hidden aria-hidden="true">
      <div class="ai-panel-backdrop" id="ai-panel-backdrop"></div>
      <div class="ai-panel-sheet" role="dialog" aria-labelledby="ai-panel-title">
        <header class="ai-panel-header">
          <button type="button" class="ai-panel-close" id="ai-panel-close" title="إغلاق">✕</button>
          <div class="ai-panel-head-text">
            <h2 class="ai-panel-title" id="ai-panel-title">ملخص الخبر</h2>
            <p class="ai-panel-meta" id="ai-panel-meta"></p>
          </div>
        </header>
        <div class="ai-panel-body" id="ai-panel-body">
          <p class="ai-panel-loading" id="ai-panel-loading">جاري تحميل المقال وتحليله…</p>
          <div class="ai-panel-content" id="ai-panel-content" hidden></div>
          <p class="ai-panel-error" id="ai-panel-error" hidden></p>
        </div>
        <footer class="ai-panel-footer">
          <button type="button" class="ai-secondary-btn" id="ai-open-source" hidden>فتح المصدر</button>
        </footer>
      </div>
    </div>

    <script src="lib/newsFetcher.js"></script>
    <script src="lib/weather.js"></script>
    <script src="lib/shareCard.js"></script>
    <script src="config.ai.stub.js"></script>
    <script src="config.ai.js"></script>
    <script src="lib/aiSummary.js"></script>
    <script src="lib/notifications.js"></script>
    <script src="app.js"></script>
    <script src="widget.js"></script>
  </body>
</html>
